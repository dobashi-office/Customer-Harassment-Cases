<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カスタマーハラスメント事例集</title>

<style>

:root{
--bg1:#0f172a;
--bg2:#1e293b;
--accent:#334155;
--card:#ffffff;
--text:#1f2937;
--sub:#6b7280;
--line:#e5e7eb;
--primary:#2563eb;
--shadow:0 20px 40px rgba(0,0,0,0.08);
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;
background:linear-gradient(135deg,#f1f5f9,#e2e8f0);
min-height:100vh;
padding:40px 20px;
color:var(--text);
}

.wrapper{
max-width:900px;
margin:auto;
}

.hero{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
padding:40px;
border-radius:20px;
margin-bottom:30px;
box-shadow:var(--shadow);
}

.hero h1{
font-size:32px;
margin-bottom:10px;
letter-spacing:.05em;
}

.hero p{
color:#cbd5e1;
line-height:1.7;
}

.section{
background:white;
border-radius:20px;
padding:30px;
box-shadow:var(--shadow);
}

.card{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
border-radius:16px;
border:1px solid var(--line);
margin-bottom:16px;
text-decoration:none;
color:inherit;
transition:.2s;
}

.card:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(0,0,0,0.08);
border-color:#cbd5e1;
}

.left{
display:flex;
gap:16px;
align-items:center;
}

.number{
width:50px;
height:50px;
border-radius:12px;
background:#f1f5f9;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:20px;
color:#334155;
}

.title{
font-size:18px;
font-weight:600;
margin-bottom:4px;
}

.desc{
font-size:14px;
color:#6b7280;
}

.arrow{
font-size:24px;
color:#94a3b8;
}

.footer{
text-align:center;
margin-top:20px;
font-size:12px;
color:#6b7280;
}

</style>

</head>

<body>

<div class="wrapper">

<div class="hero">
<h1>カスタマーハラスメント事例集</h1>
<p>
実際に発生したカスタマーハラスメント事例をもとに、<br>
対応のポイントとリスクを整理した資料です。<br>
クリックすると各事例ページが開きます。
</p>
</div>

<div class="section">

<a class="card" href="事例１_ビールかけちゃった事件.html">
<div class="left">
<div class="number">1</div>
<div>
<div class="title">ビールかけちゃった事件</div>
<div class="desc">
初期対応の誤りから重大なクレームへ発展した事例
</div>
</div>
</div>
<div class="arrow">›</div>
</a>

<a class="card" href="事例２_食事がまずい事件.html">
<div class="left">
<div class="number">2</div>
<div>
<div class="title">食事がまずい事件</div>
<div class="desc">
一言の発言から理不尽なクレームへ発展した事例
</div>
</div>
</div>
<div class="arrow">›</div>
</a>

<a class="card" href="事例３_髪の毛混入事件.html">
<div class="left">
<div class="number">3</div>
<div>
<div class="title">髪の毛混入事件</div>
<div class="desc">
会話のすれ違いによりクレームが拡大した事例
</div>
</div>
</div>
<div class="arrow">›</div>
</a>

<a class="card" href="事例４_コンビニ嫌がらせ事件.html">
<div class="left">
<div class="number">4</div>
<div>
<div class="title">コンビニ嫌がらせ事件</div>
<div class="desc">
マニュアル対応でも発生するカスタマーハラスメント
</div>
</div>
</div>
<div class="arrow">›</div>
</a>

</div>

<div class="footer">

</div>

</body>
</html>
